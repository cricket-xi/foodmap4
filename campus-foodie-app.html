<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Campus Foodie - 纯前端复刻版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        /* Hide scrollbar for horizontal scrolling */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* App Container for Desktop viewing */
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background-color: #f9fafb;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }
        #map { height: calc(100vh - 64px); width: 100%; z-index: 10; }
    </style>
</head>
<body class="bg-gray-100">

<div class="app-container flex flex-col h-screen overflow-hidden">

    <!-- Header (Dynamic based on tab) -->
    <header id="app-header" class="bg-white px-4 pt-12 pb-4 shadow-sm z-20 sticky top-0">
        <h1 id="header-title" class="text-2xl font-bold text-gray-800">发现美食</h1>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto pb-20 relative">
        
        <!-- HOME TAB -->
        <div id="tab-home" class="tab-content active px-4 py-4">
            <!-- Search -->
            <div class="relative mb-6">
                <input type="text" placeholder="搜索大学城美食、商家..." class="w-full bg-gray-100 rounded-full py-3 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500">
                <span class="absolute left-4 top-3 text-gray-400">🔍</span>
            </div>

            <!-- Categories -->
            <div class="mb-8">
                <h2 class="text-lg font-bold text-gray-800 mb-3">分类</h2>
                <div class="flex space-x-4 overflow-x-auto hide-scrollbar pb-2">
                    <div class="flex flex-col items-center min-w-[60px]">
                        <div class="w-12 h-12 rounded-full bg-orange-100 flex items-center justify-center text-2xl mb-1">🍚</div>
                        <span class="text-xs text-gray-600">简餐</span>
                    </div>
                    <div class="flex flex-col items-center min-w-[60px]">
                        <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-2xl mb-1">🧋</div>
                        <span class="text-xs text-gray-600">饮品</span>
                    </div>
                    <div class="flex flex-col items-center min-w-[60px]">
                        <div class="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center text-2xl mb-1">🌶️</div>
                        <span class="text-xs text-gray-600">麻辣烫</span>
                    </div>
                    <div class="flex flex-col items-center min-w-[60px]">
                        <div class="w-12 h-12 rounded-full bg-yellow-100 flex items-center justify-center text-2xl mb-1">🍔</div>
                        <span class="text-xs text-gray-600">快餐</span>
                    </div>
                    <div class="flex flex-col items-center min-w-[60px]">
                        <div class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center text-2xl mb-1">🥗</div>
                        <span class="text-xs text-gray-600">轻食</span>
                    </div>
                </div>
            </div>

            <!-- Popular Restaurants -->
            <div>
                <div class="flex justify-between items-end mb-4">
                    <h2 class="text-lg font-bold text-gray-800">热门推荐</h2>
                    <span class="text-xs text-orange-600 font-medium">查看全部</span>
                </div>
                <div id="restaurant-list" class="space-y-4">
                    <!-- Rendered via JS -->
                </div>
            </div>
        </div>

        <!-- MAP TAB -->
        <div id="tab-map" class="tab-content h-full w-full relative">
            <div id="map"></div>
            <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-white px-4 py-2 rounded-full shadow-lg z-[400] text-sm font-medium text-gray-700 flex items-center gap-2">
                📍 广州大学城
            </div>
        </div>

        <!-- RANDOMIZER TAB -->
        <div id="tab-random" class="tab-content h-full flex flex-col items-center justify-center px-6">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-bold text-gray-800 mb-2">今天吃什么？</h2>
                <p class="text-gray-500">纠结的话，就交给命运吧！</p>
            </div>
            
            <div id="random-result-card" class="w-full bg-white rounded-3xl shadow-xl p-8 text-center hidden mb-10 transform transition-all">
                <div class="text-6xl mb-4" id="random-icon">🍔</div>
                <h3 class="text-2xl font-bold text-gray-800 mb-2" id="random-name">餐厅名称</h3>
                <p class="text-gray-500 mb-4" id="random-desc">餐厅描述</p>
                <div class="inline-block bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-sm font-medium" id="random-tag">标签</div>
            </div>

            <button id="btn-randomize" class="w-48 h-48 rounded-full bg-gradient-to-br from-orange-400 to-orange-600 text-white shadow-2xl flex flex-col items-center justify-center transform transition hover:scale-105 active:scale-95">
                <span class="text-5xl mb-2">🎲</span>
                <span class="text-xl font-bold">开始抽取</span>
            </button>
        </div>

        <!-- PROFILE TAB -->
        <div id="tab-profile" class="tab-content px-4 py-6">
            <div class="bg-white rounded-2xl p-6 shadow-sm flex items-center gap-4 mb-6">
                <div class="w-16 h-16 rounded-full bg-gray-200 flex items-center justify-center text-2xl">
                    👤
                </div>
                <div>
                    <h2 class="text-xl font-bold text-gray-800">同学你好</h2>
                    <p class="text-sm text-gray-500">广州大学城吃货</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-white rounded-2xl p-4 shadow-sm text-center">
                    <div class="text-2xl font-bold text-orange-600 mb-1">12</div>
                    <div class="text-xs text-gray-500">我的收藏</div>
                </div>
                <div class="bg-white rounded-2xl p-4 shadow-sm text-center">
                    <div class="text-2xl font-bold text-orange-600 mb-1">5</div>
                    <div class="text-xs text-gray-500">我的评价</div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                <div class="p-4 border-b border-gray-100 flex justify-between items-center">
                    <span class="text-gray-700 font-medium">🎟️ 我的优惠券</span>
                    <span class="text-gray-400">›</span>
                </div>
                <div class="p-4 border-b border-gray-100 flex justify-between items-center">
                    <span class="text-gray-700 font-medium">📜 历史订单</span>
                    <span class="text-gray-400">›</span>
                </div>
                <div class="p-4 flex justify-between items-center">
                    <span class="text-gray-700 font-medium">⚙️ 设置</span>
                    <span class="text-gray-400">›</span>
                </div>
            </div>
        </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bg-white border-t border-gray-200 flex justify-around items-center h-16 pb-safe z-50 absolute bottom-0 w-full">
        <button class="nav-btn flex flex-col items-center justify-center w-full h-full text-orange-600" data-target="home">
            <span class="text-xl mb-1">🏠</span>
            <span class="text-[10px] font-medium">首页</span>
        </button>
        <button class="nav-btn flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600" data-target="map">
            <span class="text-xl mb-1">🗺️</span>
            <span class="text-[10px] font-medium">地图</span>
        </button>
        <button class="nav-btn flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600" data-target="random">
            <span class="text-xl mb-1">🎲</span>
            <span class="text-[10px] font-medium">随机</span>
        </button>
        <button class="nav-btn flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600" data-target="profile">
            <span class="text-xl mb-1">👤</span>
            <span class="text-[10px] font-medium">我的</span>
        </button>
    </nav>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Mock Data
    const restaurants = [
        { id: 1, name: "广大商业中心烤肉饭", rating: 4.8, tags: ["快餐", "高性价比"], price: "¥15/人", icon: "🍱", desc: "大学城必吃的高性价比烤肉饭" },
        { id: 2, name: "GOGO新天地麻辣烫", rating: 4.5, tags: ["麻辣烫", "宵夜"], price: "¥20/人", icon: "🌶️", desc: "深夜食堂，菜品丰富新鲜" },
        { id: 3, name: "中大南门糖水铺", rating: 4.9, tags: ["甜品", "老字号"], price: "¥10/人", icon: "🍧", desc: "传统广式糖水，夏日解暑必备" },
        { id: 4, name: "贝岗村手工汉堡", rating: 4.6, tags: ["西式", "网红店"], price: "¥35/人", icon: "🍔", desc: "纯手工牛肉饼，汁水丰盈" },
        { id: 5, name: "华师饭堂烧腊窗口", rating: 4.7, tags: ["食堂", "烧腊"], price: "¥12/人", icon: "🍖", desc: "传说中大学城最好吃的烧鸭腿" }
    ];

    // Render Home List
    const listContainer = document.getElementById('restaurant-list');
    restaurants.forEach(r => {
        const card = document.createElement('div');
        card.className = "bg-white rounded-2xl p-4 shadow-sm flex gap-4 items-center";
        card.innerHTML = `
            <div class="w-20 h-20 rounded-xl bg-gray-100 flex items-center justify-center text-4xl flex-shrink-0">
                ${r.icon}
            </div>
            <div class="flex-1">
                <div class="flex justify-between items-start">
                    <h3 class="font-bold text-gray-800 text-base">${r.name}</h3>
                    <span class="text-orange-500 font-bold text-sm flex items-center gap-1">⭐ ${r.rating}</span>
                </div>
                <p class="text-xs text-gray-500 mt-1 line-clamp-1">${r.desc}</p>
                <div class="flex justify-between items-center mt-2">
                    <div class="flex gap-2">
                        ${r.tags.map(tag => `<span class="bg-gray-100 text-gray-600 text-[10px] px-2 py-1 rounded-md">${tag}</span>`).join('')}
                    </div>
                    <span class="text-xs font-semibold text-gray-800">${r.price}</span>
                </div>
            </div>
        `;
        listContainer.appendChild(card);
    });

    // Tab Navigation Logic
    const navBtns = document.querySelectorAll('.nav-btn');
    const tabs = document.querySelectorAll('.tab-content');
    const headerTitle = document.getElementById('header-title');
    const appHeader = document.getElementById('app-header');
    
    let mapInitialized = false;
    let map = null;

    const titles = {
        'home': '发现美食',
        'map': '美食地图',
        'random': '随机抽取',
        'profile': '个人中心'
    };

    navBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const target = btn.getAttribute('data-target');
            
            // Update buttons styling
            navBtns.forEach(b => {
                b.classList.remove('text-orange-600');
                b.classList.add('text-gray-400');
            });
            btn.classList.remove('text-gray-400');
            btn.classList.add('text-orange-600');

            // Update Header
            headerTitle.textContent = titles[target];
            if(target === 'map') {
                appHeader.classList.add('hidden'); // Hide header on map for full screen feel
            } else {
                appHeader.classList.remove('hidden');
            }

            // Switch Tabs
            tabs.forEach(tab => tab.classList.remove('active'));
            document.getElementById(`tab-${target}`).classList.add('active');

            // Initialize Map if needed
            if (target === 'map' && !mapInitialized) {
                setTimeout(() => {
                    // 广州大学城坐标
                    map = L.map('map').setView([23.040, 113.390], 14);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap contributors'
                    }).addTo(map);
                    
                    // Add markers for mock data
                    restaurants.forEach(r => {
                        // Randomize coordinates slightly around university town
                        const lat = 23.040 + (Math.random() - 0.5) * 0.02;
                        const lng = 113.390 + (Math.random() - 0.5) * 0.02;
                        L.marker([lat, lng]).addTo(map)
                            .bindPopup(`<b>${r.name}</b><br>${r.desc}`);
                    });
                    
                    mapInitialized = true;
                }, 100);
            } else if (target === 'map' && mapInitialized) {
                map.invalidateSize();
            }
        });
    });

    // Randomizer Logic
    const btnRandomize = document.getElementById('btn-randomize');
    const resultCard = document.getElementById('random-result-card');
    
    btnRandomize.addEventListener('click', () => {
        // Add spinning animation
        btnRandomize.classList.add('animate-spin');
        resultCard.classList.add('hidden');
        
        setTimeout(() => {
            btnRandomize.classList.remove('animate-spin');
            
            // Pick random
            const randomRes = restaurants[Math.floor(Math.random() * restaurants.length)];
            
            // Update UI
            document.getElementById('random-icon').textContent = randomRes.icon;
            document.getElementById('random-name').textContent = randomRes.name;
            document.getElementById('random-desc').textContent = randomRes.desc;
            document.getElementById('random-tag').textContent = randomRes.tags[0];
            
            // Show result
            resultCard.classList.remove('hidden');
            resultCard.style.animation = 'fadeIn 0.5s ease-out forwards';
        }, 1000);
    });

</script>
</body>
</html>
